# POC Experiment: ECG Priority Model Sweep
#
# Compares the user's priority model set on the same ECG dataset.
# Order: Transformer (baseline) → PatchTST → TimesNet → TimeMixer →
#        Informer → SegRNN
#
# Run with:
#   python scripts/train.py --config configs/experiments/poc_ecg_priority_sweep.yaml

experiment:
  name: poc_ecg_priority_sweep
  description: >
    Sweep priority anomaly detection models on resting ECG data.
    Evaluation: reconstruction error on post_exercise data (proxy anomaly).
  mode: centralized

data:
  patient: brenton
  sensor: ecg
  train_conditions: [resting]
  val_conditions: [resting]
  test_conditions: [post_exercise]
  seq_len: 100
  step: 1
  train_ratio: 0.7
  val_ratio: 0.1

preprocessing:
  target_fs: 100
  ecg:
    bandpass_low: 0.5
    bandpass_high: 40.0
    filter_order: 4
  scaler: standard
  scaler_fit_condition: resting

training:
  epochs: 10
  batch_size: 32
  learning_rate: 0.0001
  patience: 3
  lr_schedule: type1
  anomaly_ratio: 1.0
  seed: 42
  device: auto

fl:
  enabled: false

sweep:
  - model:
      name: Transformer
      enc_in: 1
      c_out: 1
      d_model: 64
      n_heads: 8
      e_layers: 1
      d_ff: 128
      dropout: 0.1

  - model:
      name: PatchTST
      enc_in: 1
      c_out: 1
      d_model: 32
      n_heads: 8
      e_layers: 1
      d_ff: 32
      dropout: 0.1
      patch_len: 16

  - model:
      name: TimesNet
      enc_in: 1
      c_out: 1
      d_model: 32
      d_ff: 64
      e_layers: 2
      dropout: 0.1
      top_k: 3
      num_kernels: 4

  - model:
      name: TimeMixer
      enc_in: 1
      c_out: 1
      d_model: 32
      d_ff: 64
      e_layers: 2
      dropout: 0.1
      down_sampling_layers: 0
      down_sampling_window: 1
      channel_independence: 1
      decomp_method: moving_avg
      moving_avg: 25
      use_norm: 1

  - model:
      name: Informer
      enc_in: 1
      c_out: 1
      d_model: 32
      n_heads: 8
      e_layers: 2
      d_ff: 64
      dropout: 0.1
      factor: 5

  - model:
      name: SegRNN
      enc_in: 1
      c_out: 1
      d_model: 32
      dropout: 0.1
      seg_len: 25
