# POC Experiment: Centralized ECG Model Sweep — All Tier 1 Models
#
# Research goal: Compare all 8 Tier 1 anomaly detection models on the same
#                ECG dataset to identify the best-performing architecture
#                for physiological data before proceeding to federated experiments.
#
# Each model entry overrides the model section. Training/data config is shared.

experiment:
  name: poc_ecg_model_sweep
  description: >
    Sweep all Tier 1 anomaly detection models on resting ECG data.
    Comparison baseline before FL experiments.
  mode: centralized

data:
  patient: brenton
  sensor: ecg
  train_conditions: [resting]
  val_conditions: [resting]
  test_conditions: [post_exercise]
  seq_len: 100
  step: 1
  train_ratio: 0.7
  val_ratio: 0.1

preprocessing:
  target_fs: 100
  ecg:
    bandpass_low: 0.5
    bandpass_high: 40.0
    filter_order: 4
  scaler: standard
  scaler_fit_condition: resting

# Shared training parameters — applied to all models
training:
  epochs: 10
  batch_size: 32
  learning_rate: 0.0001
  patience: 3
  lr_schedule: type1
  anomaly_ratio: 1.0
  seed: 42
  device: auto

fl:
  enabled: false

# Per-model overrides — each entry runs as a separate experiment.
# The sweep runner iterates over this list and merges each entry with
# the shared config above.
sweep:
  - model:
      name: Transformer
      enc_in: 1
      c_out: 1
      d_model: 64
      n_heads: 8
      e_layers: 1
      d_ff: 128
      dropout: 0.1

  - model:
      name: iTransformer
      enc_in: 1
      c_out: 1
      d_model: 32
      n_heads: 8
      e_layers: 1
      d_ff: 32
      dropout: 0.1

  - model:
      name: PatchTST
      enc_in: 1
      c_out: 1
      d_model: 32
      n_heads: 8
      e_layers: 1
      d_ff: 32
      dropout: 0.1
      patch_len: 16

  - model:
      name: KANAD
      enc_in: 1
      c_out: 1
      d_model: 3

  - model:
      name: Mamba2
      enc_in: 1
      c_out: 1
      d_model: 64
      d_ff: 64
      n_heads: 4
      expand: 2
      d_conv: 4
      e_layers: 2
      dropout: 0.1

  - model:
      name: Autoformer
      enc_in: 1
      c_out: 1
      d_model: 32
      n_heads: 8
      e_layers: 1
      d_ff: 32
      dropout: 0.1
      moving_avg: 25
      factor: 1

  - model:
      name: Nonstationary_Transformer
      enc_in: 1
      c_out: 1
      d_model: 64
      n_heads: 8
      e_layers: 2
      d_ff: 128
      dropout: 0.1
      p_hidden_dims: [128, 128]
      p_hidden_layers: 2

  - model:
      name: DLinear
      enc_in: 1
      c_out: 1
      moving_avg: 25
      individual: false
