# POC Experiment: Centralized Anomaly Detection — ECG, Transformer model
#
# Research goal: Validate the full pipeline on the proof-of-concept ECG dataset.
#                Establish baseline Transformer performance before FL experiments.
#
# Dataset: brenton ECG, train on resting, test on post_exercise.
# Proxy anomaly definition: post_exercise windows are treated as "anomalous"
# relative to the resting baseline. This is a pipeline validation, not a
# clinical anomaly definition.

experiment:
  name: poc_ecg_transformer
  description: >
    Centralized ECG anomaly detection baseline.
    Trains a Transformer autoencoder on resting ECG data and evaluates
    reconstruction error on post-exercise data as a proxy for anomalous signal.
  mode: centralized  # centralized | federated

data:
  patient: brenton
  sensor: ecg
  train_conditions: [resting]
  val_conditions: [resting]       # Val split carved from train_conditions data
  test_conditions: [post_exercise]
  seq_len: 100                    # Window length in samples (1.0s at 100 Hz)
  step: 1                         # Sliding window step (1 = fully overlapping)
  train_ratio: 0.7
  val_ratio: 0.1
  # Remaining 0.2 of train_conditions data is unused (test uses test_conditions)

preprocessing:
  target_fs: 100                  # Hz after resampling
  ecg:
    bandpass_low: 0.5
    bandpass_high: 40.0
    filter_order: 4
  scaler: standard
  scaler_fit_condition: resting   # Must match train_conditions[0]

model:
  name: Transformer
  enc_in: 1                       # ECG = 1 channel
  c_out: 1
  d_model: 64
  n_heads: 8
  e_layers: 1
  d_ff: 128
  dropout: 0.1

training:
  epochs: 10
  batch_size: 32
  learning_rate: 0.0001
  patience: 3
  lr_schedule: type1
  anomaly_ratio: 1.0              # percentile: threshold = P(100 - anomaly_ratio)
  seed: 42
  device: auto                    # auto | cpu | cuda | mps

fl:
  enabled: false
