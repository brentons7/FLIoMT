# FL Experiment: MIT-BIH Arrhythmia — 2 Clients
#
# Reference config for the MIT-BIH 2-client federated experiment.
# Per-model server scripts (scripts/fl/start_server_*.sh) encode the
# optimal FL hyperparameters (rounds, LR schedule, local_epochs).
# Architecture defaults live in fl/run_client.py (_MODEL_PRESETS).
#
# Each client trains on one MIT-BIH recording:
#   Client 0 (Orin Nano #2): mitbih_213
#   Client 1 (Pi 5):         mitbih_106
#
# Run preprocessing first:
#   python -m preprocessing.mitbih_pipeline

experiment:
  name: fl_mitbih_2client
  description: >
    Federated ECG anomaly detection on MIT-BIH Arrhythmia Database.
    Each client holds one recording; trains on normal beats, tests on arrhythmia.
  mode: federated

data:
  patient: mitbih_213           # Override per device via --patient CLI arg
  sensor: ecg
  train_conditions: [normal]
  val_conditions: [normal]
  test_conditions: [arrhythmia]
  seq_len: 128
  step: 1
  train_ratio: 0.7
  val_ratio: 0.1

preprocessing:
  target_fs: 100
  ecg:
    bandpass_low: 0.5
    bandpass_high: 40.0
    filter_order: 4
  scaler: standard
  scaler_fit_condition: normal

model:
  name: PatchTST             # Change via MODEL= env var or --model CLI arg
  enc_in: 1
  c_out: 1
  d_model: 128
  d_ff: 256
  n_heads: 8
  e_layers: 4
  dropout: 0.1
  patch_len: 16
  stride: 8

training:
  epochs: 1
  batch_size: 32
  learning_rate: 0.0001
  anomaly_ratio: 1.0
  seed: 42
  device: auto

fl:
  enabled: true
  server_address: "127.0.0.1:8080"
  rounds: 150
  min_clients: 2
  local_epochs: 1
  learning_rate: 0.0001
  lr_min: 0.00001
  lr_schedule: cosine
  partition_strategy: temporal
  num_partitions: 1             # No temporal split — each client has its own patient
