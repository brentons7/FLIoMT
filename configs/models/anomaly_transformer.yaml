# AnomalyTransformer — hyperparameters for anomaly detection
# Source: Xu et al., ICLR 2022, "Anomaly Transformer"
# Tier 1 | Edge-compatible: yes
#
# Key difference from Transformer: each attention head learns a Gaussian prior
# over position distances (via log_sigma). The symmetric KL between this prior
# and the standard softmax attention (association discrepancy) is added to the
# reconstruction loss during training, scaled by assoc_lambda.

model:
  name: AnomalyTransformer
  d_model: 64
  n_heads: 8
  e_layers: 3
  d_ff: 128
  dropout: 0.1
  assoc_lambda: 0.0003    # Weight of association discrepancy added to MSE loss
