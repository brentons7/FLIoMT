# Informer — default hyperparameters for anomaly detection
# Source: tslib/scripts/anomaly_detection/MSL/Informer.sh
# Tier 2 | Edge-compatible: yes
# Note: ProbSparse attention with factor=5 samples ~5*log(L) queries per step.
#       Encoder-only (no decoder) for AD — same architecture as Transformer
#       but with probabilistic sparse attention instead of full attention.

model:
  name: Informer
  d_model: 32
  n_heads: 8
  e_layers: 2
  d_ff: 64
  dropout: 0.1
  factor: 5
  # enc_in and c_out set by experiment config
