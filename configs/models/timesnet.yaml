# TimesNet — default hyperparameters for anomaly detection
# Source: tslib/scripts/anomaly_detection/MSL/TimesNet.sh
# Tier 2 | Edge-compatible: yes (2D conv on CPU is manageable for short sequences)
# Note: top_k=3 is appropriate for physio signals with few dominant frequencies.
#       num_kernels=4 reduces compute vs. default 6 with minimal accuracy cost.

model:
  name: TimesNet
  d_model: 32
  d_ff: 64
  e_layers: 2
  dropout: 0.1
  top_k: 3
  num_kernels: 4
  # enc_in and c_out set by experiment config
