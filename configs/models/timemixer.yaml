# TimeMixer — default hyperparameters for anomaly detection
# Source: tslib/scripts/anomaly_detection/MSL/TimeMixer.sh
# Tier 2 | Edge-compatible: yes
# Note: down_sampling_layers=0 → single-scale (no multi-resolution downsampling).
#       For multi-scale, set down_sampling_layers=2, down_sampling_method=avg.

model:
  name: TimeMixer
  d_model: 32
  d_ff: 64
  e_layers: 2
  dropout: 0.1
  down_sampling_layers: 0
  down_sampling_window: 1
  down_sampling_method: null
  channel_independence: 1
  decomp_method: moving_avg
  moving_avg: 25
  use_norm: 1
  # enc_in and c_out set by experiment config
