# Nonstationary_Transformer — default hyperparameters for anomaly detection
# Source: tslib/models/Nonstationary_Transformer.py (no dedicated AD script found)
# Tier 1 | Edge-compatible: yes
# Note: The de-stationary projector handles amplitude and frequency shifts
#       across activity levels. p_hidden_dims configures the projector MLP.

model:
  name: Nonstationary_Transformer
  d_model: 64
  n_heads: 8
  e_layers: 2
  d_ff: 128
  dropout: 0.1
  p_hidden_dims: [128, 128]  # Projector MLP hidden dimensions
  p_hidden_layers: 2
