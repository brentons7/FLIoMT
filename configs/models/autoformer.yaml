# Autoformer — default hyperparameters for anomaly detection
# Source: tslib/scripts/anomaly_detection/MSL/Autoformer.sh
# Tier 1 | Edge-compatible: yes
# Note: moving_avg=25 defines the trend component. The encoder processes the *seasonal*
#       residual (signal minus trend), so a larger moving_avg puts more of the cardiac
#       waveform (QRS, P, T waves) into the seasonal component the encoder actually sees.
#       Reducing moving_avg starves the encoder — confirmed experimentally (0.239 → 0.525).

model:
  name: Autoformer
  d_model: 64
  n_heads: 8
  e_layers: 2
  d_ff: 128
  dropout: 0.1
  moving_avg: 25     # Moving average window for series decomposition
  factor: 1          # Autocorrelation factor
