# Autoformer — default hyperparameters for anomaly detection
# Source: tslib/scripts/anomaly_detection/MSL/Autoformer.sh
# Tier 1 | Edge-compatible: yes
# Note: moving_avg=7 at 100 Hz = 70ms kernel — short enough to preserve the QRS complex.
#       The original TSLib default of 25 (250ms) destroyed cardiac spikes for seq_len=100.

model:
  name: Autoformer
  d_model: 64
  n_heads: 8
  e_layers: 2
  d_ff: 128
  dropout: 0.1
  moving_avg: 7      # Moving average window for series decomposition
  factor: 1          # Autocorrelation factor
