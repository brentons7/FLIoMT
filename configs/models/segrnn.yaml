# SegRNN — default hyperparameters for anomaly detection
# Source: tslib/scripts/anomaly_detection/MSL/SegRNN.sh
# Tier 2 | Edge-compatible: yes (GRU is compute-light, suitable for Pi 5)
# Note: seg_len=25 divides seq_len=100 into 4 segments at 100 Hz.
#       Each segment = 250ms, covering ~1 cardiac cycle at rest.
#       Streaming/causal inference: encoder is left-to-right GRU.

model:
  name: SegRNN
  d_model: 32
  dropout: 0.1
  seg_len: 25
  # enc_in and c_out set by experiment config
